spring.main.banner-mode=off
spring.application.name=archiledge-agentic-memory
spring.ai.mcp.server.name=archiledge-agentic-memory
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
server.port=8080
logging.level.root=INFO
spring.lifecycle.timeout-per-shutdown-phase=5s

# ladybugdb.extension-dir=  # optional: custom directory for LadybugDB extension cache

# CORS configuration
cors.enabled=true
cors.allow_any_origin=true
